name: Build Edge Docker Image

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms, comma-separated"
        required: true
        default: "linux/arm64"
      include_rules:
        description: "Bundle base/rules into the image"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      upload_tar:
        description: "Upload per-platform docker image tar artifacts"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      push_ghcr:
        description: "Push a multi-arch image to GitHub Container Registry"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      tag:
        description: "Image tag used when pushing to GHCR"
        required: true
        default: "edge"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate options
        if: ${{ inputs.push_ghcr != 'true' && inputs.upload_tar != 'true' }}
        run: |
          echo "Nothing to do: enable upload_tar, push_ghcr, or both." >&2
          exit 1

      - name: Prepare image name
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}-edge"
          echo "IMAGE=${image,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: ${{ inputs.push_ghcr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: ${{ inputs.push_ghcr == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ inputs.tag }}
            ${{ env.IMAGE }}:sha-${{ env.SHORT_SHA }}
          build-args: |
            INCLUDE_RULES=${{ inputs.include_rules == 'true' && '1' || '0' }}

      - name: Build docker tar artifacts
        if: ${{ inputs.upload_tar == 'true' }}
        run: |
          mkdir -p dist
          IFS=',' read -ra platforms <<< "${{ inputs.platforms }}"
          for platform in "${platforms[@]}"; do
            platform="$(echo "$platform" | xargs)"
            artifact_platform="${platform//\//-}"
            docker buildx build \
              --platform "$platform" \
              --build-arg INCLUDE_RULES=${{ inputs.include_rules == 'true' && '1' || '0' }} \
              -t "subconverter-edge:${artifact_platform}" \
              -o "type=docker,dest=dist/subconverter-edge-${artifact_platform}.tar" \
              .
            gzip -9 "dist/subconverter-edge-${artifact_platform}.tar"
          done

      - name: Upload docker tar artifacts
        if: ${{ inputs.upload_tar == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: subconverter-edge-images
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
