name: Build Edge Docker Image

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms, comma-separated. Supported: linux/amd64,linux/arm64"
        required: true
        default: "linux/amd64,linux/arm64"
      include_rules:
        description: "Bundle base/rules into the image"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      upload_tar:
        description: "Upload per-platform docker image tar artifacts"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      push_ghcr:
        description: "Push a multi-arch image to GitHub Container Registry"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      tag:
        description: "Image tag used when pushing to GHCR"
        required: true
        default: "edge"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_platform: linux-amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            artifact_platform: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate options
        if: ${{ inputs.push_ghcr != 'true' && inputs.upload_tar != 'true' }}
        run: |
          echo "Nothing to do: enable upload_tar, push_ghcr, or both." >&2
          exit 1

      - name: Prepare image name
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}-edge"
          echo "IMAGE=${image,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: ${{ inputs.push_ghcr == 'true' && contains(inputs.platforms, matrix.platform) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        if: ${{ inputs.push_ghcr == 'true' && contains(inputs.platforms, matrix.platform) }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ inputs.tag }}-${{ matrix.artifact_platform }}
            ${{ env.IMAGE }}:sha-${{ env.SHORT_SHA }}-${{ matrix.artifact_platform }}
          build-args: |
            INCLUDE_RULES=${{ inputs.include_rules == 'true' && '1' || '0' }}

      - name: Build docker tar artifacts
        if: ${{ inputs.upload_tar == 'true' && contains(inputs.platforms, matrix.platform) }}
        run: |
          mkdir -p dist
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --build-arg INCLUDE_RULES=${{ inputs.include_rules == 'true' && '1' || '0' }} \
            -t "subconverter-edge:${{ matrix.artifact_platform }}" \
            -o "type=docker,dest=dist/subconverter-edge-${{ matrix.artifact_platform }}.tar" \
            .
          gzip -9 "dist/subconverter-edge-${{ matrix.artifact_platform }}.tar"

      - name: Upload platform docker tar artifact
        if: ${{ inputs.upload_tar == 'true' && contains(inputs.platforms, matrix.platform) }}
        uses: actions/upload-artifact@v4
        with:
          name: subconverter-edge-${{ matrix.artifact_platform }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  bundle:
    name: bundle image artifacts
    needs: build
    if: ${{ inputs.upload_tar == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: subconverter-edge-linux-*
          path: dist
          merge-multiple: true

      - name: Upload combined docker tar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: subconverter-edge-images
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  manifest:
    name: publish multi-arch manifest
    needs: build
    if: ${{ inputs.push_ghcr == 'true' && contains(inputs.platforms, 'linux/amd64') && contains(inputs.platforms, 'linux/arm64') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Prepare image name
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}-edge"
          echo "IMAGE=${image,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ inputs.tag }}" \
            -t "${IMAGE}:sha-${SHORT_SHA}" \
            "${IMAGE}:${{ inputs.tag }}-linux-amd64" \
            "${IMAGE}:${{ inputs.tag }}-linux-arm64"
