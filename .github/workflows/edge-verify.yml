name: Build Edge Verification Config

on:
  workflow_dispatch:
    inputs:
      target:
        description: "subconverter target"
        required: true
        default: "clash"
      artifact_name:
        description: "Uploaded artifact name"
        required: true
        default: "edge-verification-config"

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      EDGE_VERIFY_URLS: ${{ secrets.EDGE_VERIFY_URLS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate secret
        run: |
          if [ -z "$EDGE_VERIFY_URLS" ]; then
            echo "Missing repository secret EDGE_VERIFY_URLS." >&2
            exit 1
          fi

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: subconverter-edge-verify:latest
          build-args: |
            INCLUDE_RULES=0

      - name: Run subconverter
        run: |
          docker run -d --name subconverter-verify -p 25500:25500 subconverter-edge-verify:latest
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:25500/version >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs subconverter-verify
          exit 1

      - name: Generate config
        run: |
          python3 - <<'PY' > /tmp/encoded_url
          import os
          import urllib.parse

          urls = os.environ["EDGE_VERIFY_URLS"].strip().replace("\n", "|")
          print(urllib.parse.quote(urls, safe=""))
          PY
          curl -fsS \
            "http://127.0.0.1:25500/sub?target=${{ inputs.target }}&new_name=true&url=$(cat /tmp/encoded_url)" \
            -o result.yaml
          test -s result.yaml

      - name: Sanity check result
        run: |
          grep -q "type: anytls" result.yaml
          grep -q "client-fingerprint" result.yaml

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: result.yaml
          if-no-files-found: error
          retention-days: 1
